name: 매일 트렌드 수집

on:
  schedule:
    - cron: "0 22 * * *" # 매일 07:00 KST
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: 트렌드 수집 및 Supabase 저장
        run: node scripts/collect-trends.mjs
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TREND_KEYWORDS: ${{ vars.TREND_KEYWORDS }}
          MAX_ITEMS_PER_PLATFORM: ${{ vars.MAX_ITEMS_PER_PLATFORM }}
